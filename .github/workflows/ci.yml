name: CI

on:
  push:
    branches:
      - main
      - testing
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Docs + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Docs consistency check
        run: bun run docs:check

      - name: Typecheck
        run: bun run typecheck

      # Serialize async tests: many desktop tests swap global JSDOM document/window and
      # cannot run concurrently without clobbering each other on shared globalThis.
      - name: Unit tests
        run: bun test --max-concurrency 1

      # Re-run each file in isolation to catch order/global-state issues that can hide
      # inside a single aggregate Bun invocation.
      - name: Stable per-file unit tests
        run: bun run test:stable -- --max-concurrency 1

      - name: Remote MCP smoke
        env:
          RUN_REMOTE_MCP_TESTS: "1"
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: bun test test/mcp.remote.grep.test.ts
