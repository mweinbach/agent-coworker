name: CI

on:
  push:
    branches:
      - main
      - testing
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/desktop/node_modules
            apps/mobile/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'apps/desktop/bun.lock', 'apps/mobile/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          bun install
          bun install --cwd apps/desktop
          bun install --cwd apps/mobile

      - name: Docs consistency check
        run: bun run docs:check

      - name: Typecheck
        run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/desktop/node_modules
            apps/mobile/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'apps/desktop/bun.lock', 'apps/mobile/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          bun install
          bun install --cwd apps/desktop
          bun install --cwd apps/mobile

      # Serialize async tests: many desktop tests swap global JSDOM document/window and
      # cannot run concurrently without clobbering each other on shared globalThis.
      - name: Unit tests
        run: bun test --max-concurrency 1

  test-stable:
    name: Stable per-file tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/desktop/node_modules
            apps/mobile/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'apps/desktop/bun.lock', 'apps/mobile/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          bun install
          bun install --cwd apps/desktop
          bun install --cwd apps/mobile

      # Re-run each file in isolation to catch order/global-state issues that can hide
      # inside a single aggregate Bun invocation. Run on main/testing pushes only.
      - name: Stable per-file unit tests
        run: bun run test:stable -- --max-concurrency 1

  remote-mcp-smoke:
    name: Remote MCP smoke
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUN_REMOTE_MCP_TESTS: "1"
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/desktop/node_modules
            apps/mobile/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'apps/desktop/bun.lock', 'apps/mobile/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          bun install
          bun install --cwd apps/desktop
          bun install --cwd apps/mobile

      - name: Remote MCP smoke tests
        run: bun test test/mcp.remote.grep.test.ts

  build-smoke:
    name: Build smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/desktop/node_modules
            apps/mobile/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'apps/desktop/bun.lock', 'apps/mobile/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          bun install
          bun install --cwd apps/desktop
          bun install --cwd apps/mobile

      - name: Build desktop resources
        run: bun run build:desktop-resources

      - name: Build cowork-server binary
        run: bun run build:server-binary

      - name: Mobile typecheck
        run: bunx tsc --noEmit -p apps/mobile/tsconfig.json
