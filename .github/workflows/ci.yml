name: CI

on:
  push:
    branches:
      - main
      - testing
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Check for tracked build artifacts
        run: |
          tracked_tsbuildinfo=$(git ls-files | grep -c '\.tsbuildinfo' || true)
          if [ "$tracked_tsbuildinfo" -gt 0 ]; then
            echo "Error: Found tracked .tsbuildinfo files (should be gitignored):"
            git ls-files | grep '\.tsbuildinfo'
            exit 1
          fi

      - name: Docs consistency check
        run: bun run docs:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format check
        run: bun run check

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      # Run files in isolated Bun processes: the aggregate runner can retain JSDOM/global
      # state until shutdown and hang after the final desktop test on CI.
      - name: Unit tests
        run: bun run test:stable -- --max-concurrency 1

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Windows sandbox helper enforcement
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath
          if (!$vsPath) { throw "Visual Studio installation not found" }
          $devCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          $arch = if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") { "arm64" } else { "amd64" }
          $helperPath = Join-Path (Get-Location) "crates\cowork-win-sandbox\target\release\cowork-win-sandbox.exe"
          $command = "`"$devCmd`" -arch=$arch -host_arch=$arch && cargo build --release --manifest-path crates\cowork-win-sandbox\Cargo.toml && set `"COWORK_WIN_SANDBOX_HELPER=$helperPath`" && bun test test/platform/sandbox.enforcement.integration.test.ts test/platform/sandbox.test.ts test/build-desktop-resources.test.ts"
          cmd /d /s /c $command
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Windows path and desktop smoke tests
        run: >
          bun test
          test/tools/tools.bash.test.ts
          test/tools/tools.glob.test.ts
          test/workspace-path.test.ts
          test/workspace.map.test.ts
          test/paths.test.ts
          test/permissions.test.ts
          test/session-backup.test.ts
          test/workspace-backups.test.ts
          test/h3.pairing-store.test.ts
          apps/desktop/test/ipc-security.test.ts
          apps/desktop/test/file-preview-modal.test.tsx
          apps/desktop/test/message-links.test.ts
          apps/desktop/test/sidecar.test.ts
          apps/desktop/test/server-manager.test.ts

  remote-mcp-smoke:
    name: Remote MCP smoke
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUN_REMOTE_MCP_TESTS: "1"
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Remote MCP smoke tests
        run: bun test test/mcp.remote.grep.test.ts

  build-smoke:
    name: Build smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Build desktop resources
        run: bun run build:desktop-resources

      - name: Build cowork-server binary
        run: bun run build:server-binary

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun
        with:
          cache-scope: mobile
          cache-dependency-path: |
            .bun-version
            bun.lock
            package.json
            apps/desktop/package.json
            packages/*/package.json
            apps/mobile/bun.lock
            apps/mobile/package.json

      - name: Install mobile dependencies
        run: bun install --cwd apps/mobile --frozen-lockfile

      - name: Mobile typecheck
        run: bun run app:mobile:typecheck

      - name: Verify Expo autolinking
        shell: bash
        run: |
          set -euo pipefail
          cd apps/mobile
          bunx expo-modules-autolinking resolve --platform apple --json > "$RUNNER_TEMP/mobile-autolinking-ios.json"
          grep -q '"packageName":"cowork-pinned-https"' "$RUNNER_TEMP/mobile-autolinking-ios.json"
          grep -q '"CoworkPinnedHttpsModule"' "$RUNNER_TEMP/mobile-autolinking-ios.json"
          bunx expo-modules-autolinking resolve --platform android --json > "$RUNNER_TEMP/mobile-autolinking-android.json"
          grep -q '"packageName":"cowork-pinned-https"' "$RUNNER_TEMP/mobile-autolinking-android.json"
          grep -q '"co.weinbach.cowork.mobile.pinnedhttps.CoworkPinnedHttpsModule"' "$RUNNER_TEMP/mobile-autolinking-android.json"

      - name: Export mobile bundle
        run: cd apps/mobile && bunx expo export --platform ios --output-dir dist-export-ci
