name: CI

on:
  push:
    branches:
      - main
      - testing
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Check for tracked build artifacts
        run: |
          tracked_tsbuildinfo=$(git ls-files | grep -c '\.tsbuildinfo' || true)
          if [ "$tracked_tsbuildinfo" -gt 0 ]; then
            echo "Error: Found tracked .tsbuildinfo files (should be gitignored):"
            git ls-files | grep '\.tsbuildinfo'
            exit 1
          fi

      - name: Docs consistency check
        run: bun run docs:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format check
        run: bun run check

      - name: Windows sandbox prebuilt lock freshness (advisory)
        shell: bash
        run: |
          set -euo pipefail

          output="$(bun scripts/winSandboxPrebuilt.ts check --target x86_64-pc-windows-msvc)"
          echo "$output"
          if ! grep -q '^prebuilt-hit=true$' <<< "$output"; then
            reason="$(grep '^reason=' <<< "$output" || true)"
            echo "::warning title=Windows sandbox prebuilt lock is stale::Desktop release builds will compile crates/cowork-win-sandbox from source (${reason}). Cut a win-sandbox-v* release and commit the refreshed prebuilt.lock.json to restore fast Windows packaging."
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Unit tests
        run: bun test --max-concurrency 1

  windows-smoke:
    name: Windows smoke (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun
        with:
          cache-scope: windows-smoke-${{ matrix.arch }}
          save-cache: "false"

      - name: Setup Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-scope: windows-smoke-${{ matrix.arch }}

      - name: Windows sandbox helper enforcement
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath
          if (!$vsPath) { throw "Visual Studio installation not found" }
          $devCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          $arch = if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") { "arm64" } else { "amd64" }
          $command = "`"$devCmd`" -arch=$arch -host_arch=$arch && cargo build --release --bins --manifest-path crates\cowork-win-sandbox\Cargo.toml"
          cmd /d /s /c $command
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $binaryRoot = Join-Path (Get-Location) "crates\cowork-win-sandbox\target\release"
          $helperPath = Join-Path $binaryRoot "cowork-win-sandbox.exe"
          $setupPath = Join-Path $binaryRoot "codex-windows-sandbox-setup.exe"
          $commandRunnerPath = Join-Path $binaryRoot "codex-command-runner.exe"
          foreach ($path in @($helperPath, $setupPath, $commandRunnerPath)) {
            if (-not (Test-Path -LiteralPath $path)) { throw "Missing Windows sandbox binary: $path" }
          }

          $env:COWORK_WIN_SANDBOX_HELPER = $helperPath
          $env:COWORK_WIN_SANDBOX_SETUP = $setupPath
          $env:COWORK_WIN_SANDBOX_COMMAND_RUNNER = $commandRunnerPath
          $env:COWORK_WIN_SANDBOX_HELPER_SHA256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $helperPath).Hash.ToLowerInvariant()
          $env:COWORK_WIN_SANDBOX_SETUP_SHA256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $setupPath).Hash.ToLowerInvariant()
          $env:COWORK_WIN_SANDBOX_COMMAND_RUNNER_SHA256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $commandRunnerPath).Hash.ToLowerInvariant()
          $env:COWORK_WIN_SANDBOX_HOME = Join-Path $env:RUNNER_TEMP "cowork-windows-sandbox"
          $env:RUN_WINDOWS_SANDBOX_INTEGRATION = "1"
          $setupWorkspace = Join-Path $env:RUNNER_TEMP "cowork-windows-sandbox-setup-workspace"
          New-Item -ItemType Directory -Force -Path $setupWorkspace | Out-Null

          & $helperPath setup --sandbox-home $env:COWORK_WIN_SANDBOX_HOME --cwd $setupWorkspace --mode workspace-write --writable-root $setupWorkspace
          if ($LASTEXITCODE -ne 0) { throw "Windows sandbox setup or enforcement probe failed with exit code $LASTEXITCODE" }

          bun test test/platform/sandbox.enforcement.integration.test.ts test/platform/sandbox.test.ts test/build-desktop-resources.test.ts apps/desktop/test/after-pack.test.ts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Windows path and desktop smoke tests
        run: >
          bun test
          test/tools/tools.bash.test.ts
          test/tools/tools.glob.test.ts
          test/workspace-path.test.ts
          test/workspace.map.test.ts
          test/paths.test.ts
          test/permissions.test.ts
          test/session-backup.test.ts
          test/workspace-backups.test.ts
          test/h3.pairing-store.test.ts
          apps/desktop/test/ipc-security.test.ts
          apps/desktop/test/file-preview-modal.test.tsx
          apps/desktop/test/message-links.test.ts
          apps/desktop/test/sidecar.test.ts
          apps/desktop/test/server-manager.test.ts

      - name: Cross-platform task and preview regressions
        run: >
          bun test
          test/task-artifact-versions.test.ts
          test/task-mode.persistence.test.ts
          test/jsonrpc.task-workspace-subscription.test.ts
          test/jsonrpc/flow.task-terminal-locks.test.ts
          test/presentationPreview.test.ts
          apps/desktop/test/bootstrap-cache.test.ts
          apps/desktop/test/jsonrpc-single-connection.test.ts
          apps/desktop/test/task-actions.test.ts
          --max-concurrency 1

  macos-smoke:
    name: macOS ARM64 smoke
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: macOS sandbox and runtime enforcement
        run: >
          bun test
          test/platform/sandbox.enforcement.integration.test.ts
          test/platform/sandbox.test.ts
          test/tools/tools.bash.test.ts
          test/coworkRuntime.test.ts
          test/build-desktop-resources.test.ts
          apps/desktop/test/sidecar.test.ts
          apps/desktop/test/server-manager.test.ts

      - name: Cross-platform task and preview regressions
        run: >
          bun test
          test/workspace-path.test.ts
          test/task-artifact-versions.test.ts
          test/task-mode.persistence.test.ts
          test/jsonrpc.task-workspace-subscription.test.ts
          test/jsonrpc/flow.task-terminal-locks.test.ts
          test/presentationPreview.test.ts
          apps/desktop/test/bootstrap-cache.test.ts
          apps/desktop/test/jsonrpc-single-connection.test.ts
          apps/desktop/test/task-actions.test.ts
          --max-concurrency 1

  remote-mcp-smoke:
    name: Remote MCP smoke
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUN_REMOTE_MCP_TESTS: "1"
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Remote MCP smoke tests
        run: bun test test/mcp.remote.grep.test.ts

  build-smoke:
    name: Build smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Build desktop resources
        run: bun run build:desktop-resources

      - name: Build cowork-server binary
        run: bun run build:server-binary

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun
        with:
          cache-scope: mobile
          cache-dependency-path: |
            .bun-version
            bun.lock
            package.json
            apps/desktop/package.json
            packages/*/package.json
            apps/mobile/bun.lock
            apps/mobile/package.json

      - name: Install mobile dependencies
        run: bun install --cwd apps/mobile --frozen-lockfile

      - name: Mobile typecheck
        run: bun run app:mobile:typecheck

      - name: Verify Expo autolinking
        shell: bash
        run: |
          set -euo pipefail
          cd apps/mobile
          bunx expo-modules-autolinking resolve --platform apple --json > "$RUNNER_TEMP/mobile-autolinking-ios.json"
          grep -q '"packageName":"cowork-pinned-https"' "$RUNNER_TEMP/mobile-autolinking-ios.json"
          grep -q '"CoworkPinnedHttpsModule"' "$RUNNER_TEMP/mobile-autolinking-ios.json"
          bunx expo-modules-autolinking resolve --platform android --json > "$RUNNER_TEMP/mobile-autolinking-android.json"
          grep -q '"packageName":"cowork-pinned-https"' "$RUNNER_TEMP/mobile-autolinking-android.json"
          grep -q '"co.weinbach.cowork.mobile.pinnedhttps.CoworkPinnedHttpsModule"' "$RUNNER_TEMP/mobile-autolinking-android.json"

      - name: Export mobile bundle
        run: cd apps/mobile && bunx expo export --platform ios --output-dir dist-export-ci
