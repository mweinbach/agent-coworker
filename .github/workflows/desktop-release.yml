name: Desktop Release

on:
  push:
    tags:
      - "v*"
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Docs consistency check
        run: bun run docs:check

      # Run each test file in a fresh Bun process: desktop tests swap global JSDOM
      # document/window and can leak async React cleanup into later files.
      - name: Unit tests
        run: bun run test:stable -- --max-concurrency 1

      - name: Typecheck
        run: bun run typecheck

  package:
    name: Package (${{ matrix.label }})
    needs: validate
    if: ${{ needs.validate.result == 'success' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      COWORK_SENTRY_DSN: ${{ vars.COWORK_SENTRY_DSN }}
      COWORK_POSTHOG_KEY: ${{ vars.COWORK_POSTHOG_KEY }}
      COWORK_POSTHOG_HOST: ${{ vars.COWORK_POSTHOG_HOST }}
      LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
      LANGFUSE_PUBLIC_KEY: ${{ vars.LANGFUSE_PUBLIC_KEY }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            label: macOS
            artifact_name: desktop-release-macos
            build_arch: arm64
          - os: windows-latest
            label: Windows x64
            artifact_name: desktop-release-windows-x64
            build_arch: x64
            updater_metadata_name: latest.yml
          - os: windows-latest
            label: Windows ARM64
            artifact_name: desktop-release-windows-arm64
            build_arch: arm64
            updater_metadata_name: latest-arm64.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-bun

      - name: Setup Rust cache
        if: ${{ runner.os == 'Windows' }}
        uses: ./.github/actions/setup-rust-cache
        with:
          cache-scope: desktop-${{ matrix.build_arch }}
          save-cache: ${{ matrix.build_arch != 'arm64' }}

      - name: Validate public telemetry build variables
        shell: bash
        run: |
          set -euo pipefail

          required=(
            COWORK_SENTRY_DSN
            COWORK_POSTHOG_KEY
            COWORK_POSTHOG_HOST
            LANGFUSE_BASE_URL
            LANGFUSE_PUBLIC_KEY
          )
          missing=()

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required public telemetry GitHub variables:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          forbidden=(
            LANGFUSE_SECRET_KEY
            COWORK_DIAGNOSTICS_UPLOAD_URL
            COWORK_CLOUD_SYNC_ENDPOINT
          )
          present=()

          for name in "${forbidden[@]}"; do
            if [ -n "${!name:-}" ]; then
              present+=("$name")
            fi
          done

          if [ "${#present[@]}" -gt 0 ]; then
            printf 'Forbidden telemetry variables must not be present in the public desktop build:\n' >&2
            printf ' - %s\n' "${present[@]}" >&2
            exit 1
          fi

      - name: Validate macOS signing and notarization inputs
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()

          if [ -z "${CSC_LINK:-}" ]; then
            missing+=("CSC_LINK (Developer ID Application certificate .p12)")
          fi

          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            missing+=("CSC_KEY_PASSWORD (Developer ID Application certificate password)")
          fi

          has_api_key_creds=false
          if [ -n "${APPLE_API_KEY_CONTENT:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            has_api_key_creds=true
          fi

          has_apple_id_creds=false
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            has_apple_id_creds=true
          fi

          if [ "$has_api_key_creds" = false ] && [ "$has_apple_id_creds" = false ]; then
            missing+=("either the ASC API key set (APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER) or the Apple ID set (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Configure Windows signing
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            Write-Host "Windows Authenticode signing credentials found; release artifacts will be signed."
            "COWORK_WIN_SIGN_RELEASE=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "Windows signing credentials not configured; building unsigned release artifacts."
            "COWORK_WIN_SIGN_RELEASE=false" >> $env:GITHUB_ENV
          }

      - name: Prepare Apple API key
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "$APPLE_API_KEY_CONTENT" ] || [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_ISSUER" ]; then
            exit 0
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Verify native macOS sandbox and runtime
        if: ${{ runner.os == 'macOS' }}
        run: >
          bun test
          test/platform/sandbox.enforcement.integration.test.ts
          test/platform/sandbox.test.ts
          test/coworkRuntime.test.ts

      - name: Build macOS desktop artifacts
        if: ${{ runner.os == 'macOS' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          COWORK_BUILD_PLATFORM: darwin
          COWORK_BUILD_ARCH: arm64
        run: bun run desktop:build -- --publish never --arm64

      - name: Build Windows desktop artifacts
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          COWORK_BUILD_PLATFORM: win32
          COWORK_BUILD_ARCH: ${{ matrix.build_arch }}
        run: |
          if ($env:COWORK_WIN_SIGN_RELEASE -eq "true") {
            $env:CSC_LINK = $env:WIN_CSC_LINK
            $env:CSC_KEY_PASSWORD = $env:WIN_CSC_KEY_PASSWORD
          }
          bun run desktop:build -- --publish never --${{ matrix.build_arch }}

      - name: Verify macOS signing and notarization
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find apps/desktop/release -type d -name '*.app' -print -quit)"

          if [ -z "$app_path" ]; then
            echo "No packaged .app bundle found under apps/desktop/release" >&2
            exit 1
          fi

          codesign_output="$(codesign -dvvv "$app_path" 2>&1)"
          printf '%s\n' "$codesign_output"

          if ! printf '%s\n' "$codesign_output" | grep -q "Developer ID Application"; then
            echo "Expected a Developer ID Application signature on $app_path" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -vv --type exec "$app_path"

      - name: Verify Windows release artifacts
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $signRelease = $env:COWORK_WIN_SIGN_RELEASE -eq "true"
          $installer = Get-ChildItem "apps/desktop/release/*-win-${{ matrix.build_arch }}.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $installer) {
            throw "No packaged .exe installer found for arch ${{ matrix.build_arch }} under apps/desktop/release"
          }

          $unpackedName = if ("${{ matrix.build_arch }}" -eq "arm64") { "win-arm64-unpacked" } else { "win-unpacked" }
          $binariesRoot = Join-Path "apps/desktop/release" "$unpackedName/resources/binaries"
          $trustedHelpers = @(
            "cowork-win-sandbox.exe",
            "codex-windows-sandbox-setup.exe",
            "codex-command-runner.exe"
          )
          $releaseFiles = @($installer.FullName)
          foreach ($name in $trustedHelpers) {
            $helperPath = Join-Path $binariesRoot $name
            if (-not (Test-Path -LiteralPath $helperPath)) {
              throw "Packaged Windows release is missing trusted helper: $helperPath"
            }
            $releaseFiles += $helperPath
          }

          if ($signRelease) {
            foreach ($filePath in $releaseFiles) {
              $signature = Get-AuthenticodeSignature -LiteralPath $filePath
              $signature | Format-List Status, StatusMessage, Path, SignerCertificate
              if ($signature.Status -ne "Valid") {
                throw "Expected a valid Authenticode signature on $filePath"
              }
            }
          }

          $manifestPath = Join-Path $binariesRoot "cowork-win-sandbox.sha256.json"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "Packaged Windows release is missing the sandbox hash manifest: $manifestPath"
          }
          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          foreach ($name in $trustedHelpers) {
            $expected = $manifest.files.PSObject.Properties[$name].Value
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $binariesRoot $name)).Hash.ToLowerInvariant()
            if (-not $expected -or $actual -ne $expected) {
              $label = if ($signRelease) { "Post-signing sandbox hash mismatch" } else { "Sandbox hash mismatch" }
              throw "$label for $name"
            }
          }

      - name: Stage Windows desktop release assets
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $stagingDir = "apps/desktop/release-upload"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Remove-Item "$stagingDir/*" -Force -ErrorAction SilentlyContinue

          $installer = Get-ChildItem "apps/desktop/release/*-win-${{ matrix.build_arch }}.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $installer) {
            throw "No packaged .exe installer found for arch ${{ matrix.build_arch }} under apps/desktop/release"
          }

          Copy-Item $installer.FullName -Destination $stagingDir
          $blockmapPath = "$($installer.FullName).blockmap"

          if (-not (Test-Path $blockmapPath)) {
            throw "Expected blockmap alongside $($installer.Name)"
          }

          Copy-Item $blockmapPath -Destination $stagingDir

          if (-not (Test-Path "apps/desktop/release/latest.yml")) {
            throw "Expected latest.yml for the Windows release"
          }

          Copy-Item "apps/desktop/release/latest.yml" -Destination (Join-Path $stagingDir "${{ matrix.updater_metadata_name }}")

          if ($env:COWORK_WIN_SIGN_RELEASE -eq "true") {
            Write-Host "Publishing Authenticode-signed installer, trusted helpers, and updater metadata."
          } else {
            Write-Host "Publishing unsigned installer, trusted helpers, and updater metadata."
          }

      - name: Upload macOS desktop artifacts
        if: ${{ runner.os == 'macOS' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows desktop artifacts
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/release-upload/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs:
      - package
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: desktop-release-*

      - name: Collect release asset list
        id: collect-release-assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/latest*.yml
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No packaged release assets were downloaded." >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        # Pinned to an immutable commit SHA: this release-publishing job runs with
        # contents: write, so the third-party action must not be a mutable tag.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: ${{ steps.collect-release-assets.outputs.files }}
          generate_release_notes: true
