name: Desktop Release

on:
  push:
    tags:
      - "v*"
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Docs consistency check
        run: bun run docs:check

      - name: Unit tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck

  package:
    name: Package (${{ matrix.label }})
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact_name: desktop-release-macos
          - os: windows-latest
            label: Windows x64
            artifact_name: desktop-release-windows-x64
            build_arch: x64
            updater_metadata_name: latest.yml
          - os: windows-latest
            label: Windows ARM64
            artifact_name: desktop-release-windows-arm64
            build_arch: arm64
            updater_metadata_name: latest-arm64.yml
            unpacked_artifact_name: desktop-smoke-windows-arm64-unpacked
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Validate macOS signing and notarization inputs
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()

          if [ -z "${CSC_LINK:-}" ]; then
            missing+=("CSC_LINK (Developer ID Application certificate .p12)")
          fi

          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            missing+=("CSC_KEY_PASSWORD (Developer ID Application certificate password)")
          fi

          has_api_key_creds=false
          if [ -n "${APPLE_API_KEY_CONTENT:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            has_api_key_creds=true
          fi

          has_apple_id_creds=false
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            has_apple_id_creds=true
          fi

          if [ "$has_api_key_creds" = false ] && [ "$has_apple_id_creds" = false ]; then
            missing+=("either the ASC API key set (APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER) or the Apple ID set (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS release secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Prepare Apple API key
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "$APPLE_API_KEY_CONTENT" ] || [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_ISSUER" ]; then
            exit 0
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build macOS desktop artifacts
        if: ${{ runner.os == 'macOS' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: bun run desktop:build -- --publish never

      - name: Build Windows desktop artifacts
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          COWORK_BUILD_PLATFORM: win32
          COWORK_BUILD_ARCH: ${{ matrix.build_arch }}
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            $env:CSC_LINK = $env:WIN_CSC_LINK
            $env:CSC_KEY_PASSWORD = $env:WIN_CSC_KEY_PASSWORD
          } else {
            Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
            Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          }

          bun run desktop:build -- --publish never --${{ matrix.build_arch }}

      - name: Verify macOS signing and notarization
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find apps/desktop/release -type d -name '*.app' -print -quit)"

          if [ -z "$app_path" ]; then
            echo "No packaged .app bundle found under apps/desktop/release" >&2
            exit 1
          fi

          codesign_output="$(codesign -dvvv "$app_path" 2>&1)"
          printf '%s\n' "$codesign_output"

          if ! printf '%s\n' "$codesign_output" | grep -q "Developer ID Application"; then
            echo "Expected a Developer ID Application signature on $app_path" >&2
            exit 1
          fi

          xcrun stapler validate "$app_path"
          spctl -a -vv --type exec "$app_path"

      - name: Verify Windows signing
        if: ${{ runner.os == 'Windows' && env.WIN_CSC_LINK != '' && env.WIN_CSC_KEY_PASSWORD != '' }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/release/*-win-${{ matrix.build_arch }}.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $installer) {
            throw "No packaged .exe installer found for arch ${{ matrix.build_arch }} under apps/desktop/release"
          }

          $signature = Get-AuthenticodeSignature $installer.FullName
          $signature | Format-List Status, StatusMessage, Path, SignerCertificate

          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature on $($installer.FullName)"
          }

      - name: Stage Windows desktop release assets
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $stagingDir = "apps/desktop/release-upload"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Remove-Item "$stagingDir/*" -Force -ErrorAction SilentlyContinue

          $installer = Get-ChildItem "apps/desktop/release/*-win-${{ matrix.build_arch }}.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $installer) {
            throw "No packaged .exe installer found for arch ${{ matrix.build_arch }} under apps/desktop/release"
          }

          Copy-Item $installer.FullName -Destination $stagingDir
          $blockmapPath = "$($installer.FullName).blockmap"

          if (-not (Test-Path $blockmapPath)) {
            throw "Expected blockmap alongside $($installer.Name)"
          }

          Copy-Item $blockmapPath -Destination $stagingDir

          if (-not (Test-Path "apps/desktop/release/latest.yml")) {
            throw "Expected latest.yml for the Windows release"
          }

          Copy-Item "apps/desktop/release/latest.yml" -Destination (Join-Path $stagingDir "${{ matrix.updater_metadata_name }}")

          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            Write-Host "Windows signing secrets configured; publishing signed installer plus updater metadata."
          } else {
            Write-Host "WIN_CSC_LINK/WIN_CSC_KEY_PASSWORD not configured; publishing unsigned installer plus updater metadata."
          }

      - name: Build Windows ARM64 unpacked desktop directory
        if: ${{ runner.os == 'Windows' && matrix.build_arch == 'arm64' }}
        shell: pwsh
        env:
          COWORK_BUILD_PLATFORM: win32
          COWORK_BUILD_ARCH: arm64
        run: |
          bun run --cwd apps/desktop build:dir -- --arm64

      - name: Upload macOS desktop artifacts
        if: ${{ runner.os == 'macOS' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows desktop artifacts
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/release-upload/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows ARM64 unpacked desktop artifact
        if: ${{ runner.os == 'Windows' && matrix.build_arch == 'arm64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.unpacked_artifact_name }}
          path: apps/desktop/release/*unpacked/**
          if-no-files-found: error
          retention-days: 14

  smoke-windows-arm64:
    name: Smoke Windows ARM64 Desktop
    needs: package
    runs-on: windows-11-arm
    timeout-minutes: 30
    steps:
      - name: Download unpacked ARM64 desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-smoke-windows-arm64-unpacked
          path: release-assets

      - name: Verify packaged sidecar starts on Windows ARM64
        shell: pwsh
        run: |
          $workspace = Join-Path $env:RUNNER_TEMP "desktop-smoke-workspace"
          $outputDir = Join-Path $env:RUNNER_TEMP "desktop-smoke-output"
          $outputPath = Join-Path $outputDir "result.json"
          $startupTimeout = [TimeSpan]::FromMinutes(2)
          $shutdownWaitMs = 15000

          New-Item -ItemType Directory -Force -Path $workspace | Out-Null
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $appExe = Get-ChildItem "release-assets" -Recurse -Filter "Cowork.exe" |
            Where-Object { $_.FullName -match "unpacked" -and $_.FullName -notmatch "\\resources\\" } |
            Select-Object -First 1

          if (-not $appExe) {
            throw "Unable to locate Cowork.exe inside the ARM64 unpacked desktop artifact"
          }

          $env:COWORK_DESKTOP_SMOKE_WORKSPACE = $workspace
          $env:COWORK_DESKTOP_SMOKE_OUTPUT = $outputPath

          $process = Start-Process -FilePath $appExe.FullName -WorkingDirectory $appExe.DirectoryName -PassThru
          $deadline = (Get-Date).Add($startupTimeout)

          while ((Get-Date) -lt $deadline) {
            if (Test-Path $outputPath) {
              break
            }

            $process.Refresh()
            if ($process.HasExited) {
              break
            }

            Start-Sleep -Milliseconds 500
          }

          if (-not (Test-Path $outputPath)) {
            $process.Refresh()

            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              throw "Desktop smoke output was not written within $($startupTimeout.TotalSeconds) seconds"
            }

            throw "Packaged ARM64 desktop smoke run exited before writing output (exit code $($process.ExitCode))"
          }

          if (-not $process.WaitForExit($shutdownWaitMs)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Packaged ARM64 desktop smoke run wrote output but did not exit within $shutdownWaitMs ms"
          }

          $result = Get-Content $outputPath -Raw | ConvertFrom-Json
          $result | ConvertTo-Json -Depth 5 | Write-Host

          if ($process.ExitCode -ne 0) {
            throw "Packaged ARM64 desktop smoke run failed with exit code $($process.ExitCode)"
          }

          if (-not $result.ok) {
            throw "Desktop smoke output reported failure"
          }

          if ($result.type -ne "server_listening") {
            throw "Expected desktop smoke output type=server_listening but saw '$($result.type)'"
          }

  publish:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - package
      - smoke-windows-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: desktop-release-*

      - name: Collect release asset list
        id: collect-release-assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/latest*.yml
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No packaged release assets were downloaded." >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect-release-assets.outputs.files }}
          generate_release_notes: true
