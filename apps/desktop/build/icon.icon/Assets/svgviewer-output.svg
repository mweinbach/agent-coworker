<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" shape-rendering="geometricPrecision">
        <title>Cowork app icon</title>
        <defs>
          <!-- Folder body gradient -->
          <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#392d25" />
            <stop offset="52%" stop-color="#31251d" />
            <stop offset="100%" stop-color="#281f18" />
          </linearGradient>

          <!-- Subtle top-left sheen -->
          <linearGradient id="panelOverlay" x1="18%" y1="12%" x2="82%" y2="88%">
            <stop offset="0%" stop-color="#8b6247" stop-opacity="0.22" />
            <stop offset="42%" stop-color="#6b4d38" stop-opacity="0.08" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0" />
          </linearGradient>

          <!-- Inner center lift / vignette to fill the body without clutter -->
          <radialGradient id="contentGlow" cx="48%" cy="46%" r="60%">
            <stop offset="0%" stop-color="#9e6f4b" stop-opacity="0.16" />
            <stop offset="52%" stop-color="#6b4b35" stop-opacity="0.08" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0" />
          </radialGradient>

          <!-- Slightly stronger top band for the window header -->
          <linearGradient id="headerBand" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6d4b36" stop-opacity="0.18" />
            <stop offset="100%" stop-color="#3f2f24" stop-opacity="0.02" />
          </linearGradient>

          <!-- Clean shadow for transparent export -->
          <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.22" />
          </filter>

          <clipPath id="folderClip">
            <path d="M 124 212
                     A 12 12 0 0 1 136 200
                     L 180 200
                     A 12 12 0 0 1 190 204
                     L 204 220
                     L 312 220
                     A 12 12 0 0 1 324 232
                     L 324 360
                     A 40 40 0 0 1 284 400
                     L 164 400
                     A 40 40 0 0 1 124 360
                     Z" />
          </clipPath>
        </defs>

        <!-- Transparent source artboard: OS applies the final icon mask -->

        <g id="folderOnly" transform="translate(55.04, -71.2) translate(256 256) scale(1.74) translate(-256 -256)">
          <!-- Base folder shape -->
          <path d="M 124 212
                   A 12 12 0 0 1 136 200
                   L 180 200
                   A 12 12 0 0 1 190 204
                   L 204 220
                   L 312 220
                   A 12 12 0 0 1 324 232
                   L 324 360
                   A 40 40 0 0 1 284 400
                   L 164 400
                   A 40 40 0 0 1 124 360
                   Z"
                fill="url(#panelGrad)"
                stroke="#ad7348"
                stroke-width="5.35"
                stroke-linejoin="round"
                filter="url(#shadow)" />

          <!-- Internal fills / structure -->
          <g clip-path="url(#folderClip)">
            <path d="M 124 212
                     A 12 12 0 0 1 136 200
                     L 180 200
                     A 12 12 0 0 1 190 204
                     L 204 220
                     L 312 220
                     A 12 12 0 0 1 324 232
                     L 324 360
                     A 40 40 0 0 1 284 400
                     L 164 400
                     A 40 40 0 0 1 124 360
                     Z"
                  fill="url(#panelOverlay)" />

            <path d="M 124 212
                     A 12 12 0 0 1 136 200
                     L 180 200
                     A 12 12 0 0 1 190 204
                     L 204 220
                     L 312 220
                     A 12 12 0 0 1 324 232
                     L 324 360
                     A 40 40 0 0 1 284 400
                     L 164 400
                     A 40 40 0 0 1 124 360
                     Z"
                  fill="url(#contentGlow)" />

            <rect x="124" y="226" width="200" height="42" fill="url(#headerBand)" opacity="0.9" />
          </g>

          <!-- Window controls -->
          <circle cx="148" cy="242" r="6" fill="#bd7f4f" />
          <circle cx="168" cy="242" r="6" fill="#e9a260" />
          <circle cx="188" cy="242" r="6" fill="#efe5d8" />

          <!-- UI divider -->
          <line x1="160" y1="266" x2="288" y2="266" stroke="#6a4a33" stroke-width="2.4" opacity="0.34" />

          <!-- One strong line + one short line -->
          <path d="M 182 304 L 274 304" fill="none" stroke="#efe5d8" stroke-width="5.3" stroke-linecap="round" opacity="0.15" />
          <path d="M 202 328 L 246 328" fill="none" stroke="#efe5d8" stroke-width="5.3" stroke-linecap="round" opacity="0.14" />

          <!-- Restored terminal prompt: smaller, softer, left-anchored -->
          <g id="terminalPrompt" opacity="0.78">
            <path d="M 176 352 L 184 360 L 176 368" fill="none" stroke="#f2e8db" stroke-width="4.9" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M 194 368 L 214 368" fill="none" stroke="#e29a62" stroke-width="7.6" stroke-linecap="round" />
          </g>
        </g>
      </svg>
