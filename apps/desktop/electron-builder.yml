appId: com.cowork.desktop
productName: Cowork
electronVersion: 42.5.0
asar: true
compression: maximum
directories:
  output: release
files:
  - out/**
  - package.json
  - "!**/*.map"
  - "!**/*.map.json"
  - "!**/*.tsbuildinfo"
  - "!**/.DS_Store"
extraResources:
  - from: ../../dist/prompts
    to: dist/prompts
  - from: ../../dist/config
    to: dist/config
  - from: ../../dist/skills
    to: dist/skills
  - from: build/icon.png
    to: tray/icon.png
  - from: build/icon.ico
    to: tray/icon.ico
  - from: resources/binaries
    to: binaries
    filter:
      - "**/*"
      - "!**/*.map"
      - "!**/*.map.json"
      - "!**/*.tsbuildinfo"
      - "!**/.DS_Store"
afterPack: scripts/afterPack.cjs
afterSign: scripts/notarize.cjs
publish:
  provider: github
  owner: mweinbach
  repo: agent-coworker
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  minimumSystemVersion: "12.0"
  hardenedRuntime: true
  notarize: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  forceCodeSigning: false
  verifyUpdateCodeSignature: true
  target:
    - nsis
linux:
  icon: build/icons
  target:
    - AppImage
    - deb
  category: Development
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
