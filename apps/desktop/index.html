<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cowork Desktop</title>
    <script>
      // Resolve the theme and standalone-window surface before CSS or React paint.
      (() => {
        const root = document.documentElement;
        const params = new URLSearchParams(window.location.search);
        const requestedWindowMode = params.get("window");
        const windowMode =
          requestedWindowMode === "quick-chat" ||
          requestedWindowMode === "utility" ||
          requestedWindowMode === "canvas"
            ? requestedWindowMode
            : "main";
        const requestedThemeSource = params.get("themeSource");
        const nativeThemeSource =
          requestedThemeSource === "light" || requestedThemeSource === "dark"
            ? requestedThemeSource
            : "system";
        const requestedResolvedTheme = params.get("resolvedTheme");
        const nativeResolvedTheme =
          requestedResolvedTheme === "light" || requestedResolvedTheme === "dark"
            ? requestedResolvedTheme
            : null;
        let themeSource = nativeThemeSource;
        let prefersDark = false;
        let forcedColors = false;
        try {
          const storedThemeSource = localStorage.getItem("cowork.themeSource");
          // Explicit native preferences are authoritative. When upgrading from
          // renderer-only persistence, retain that explicit choice for one
          // launch so the main process can persist it through IPC.
          if (nativeThemeSource === "system") {
            themeSource =
              storedThemeSource === "light" || storedThemeSource === "dark"
                ? storedThemeSource
                : "system";
          }
        } catch {
          // Persisted preference is optional; continue with the system media probes.
        }
        try {
          prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches === true;
          forcedColors =
            params.get("highContrast") === "true" ||
            window.matchMedia?.("(forced-colors: active)").matches === true;
        } catch {
          // Media probes are optional; the light system fallback is safe.
        }

        const dark =
          themeSource === "dark" ||
          (themeSource === "system" &&
            (nativeResolvedTheme ? nativeResolvedTheme === "dark" : prefersDark));
        const theme = dark ? "dark" : "light";
        const requestedPlatform = params.get("platform");
        const platform =
          requestedPlatform === "darwin" ||
          requestedPlatform === "win32" ||
          requestedPlatform === "linux"
            ? requestedPlatform
            : null;
        root.dataset.systemTheme = theme;
        root.dataset.theme = theme;
        root.dataset.themeSource = themeSource;
        root.dataset.highContrast = forcedColors ? "true" : "false";
        root.dataset.reducedTransparency =
          params.get("reducedTransparency") === "true" ? "true" : "false";
        root.dataset.windowMode = windowMode;
        if (platform) {
          root.dataset.platform = platform;
        }
        root.classList.toggle("dark", dark);
        root.classList.toggle("light", !dark);

        if (windowMode === "canvas") {
          const canvasPath = params.get("path") || "";
          root.dataset.canvasSurface = /\.(?:csv|xlsx)$/i.test(canvasPath)
            ? "spreadsheet"
            : "document";
        }
        root.style.colorScheme = forcedColors
          ? "light dark"
          : root.dataset.canvasSurface === "spreadsheet"
            ? "light"
            : theme;
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
